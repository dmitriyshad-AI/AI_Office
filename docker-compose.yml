services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_office}
      POSTGRES_USER: ${POSTGRES_USER:-ai_office}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_office}
    ports:
      - "${POSTGRES_BIND_HOST:-0.0.0.0}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_office} -d ${POSTGRES_DB:-ai_office}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_BIND_HOST:-0.0.0.0}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ai_office:ai_office@postgres:5432/ai_office}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      AI_OFFICE_API_KEY: ${AI_OFFICE_API_KEY:-ai-office-local-key}
      AI_OFFICE_API_KEYS: ${AI_OFFICE_API_KEYS:-}
      AI_OFFICE_STREAM_TOKEN_TTL_SECONDS: ${AI_OFFICE_STREAM_TOKEN_TTL_SECONDS:-120}
      AI_OFFICE_STREAM_TOKEN_SECRET: ${AI_OFFICE_STREAM_TOKEN_SECRET:-}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_RELOAD: ${API_RELOAD:-false}
      RUNTIME_ROOT: ${RUNTIME_ROOT:-${PWD}/runtime}
      SOURCE_WORKSPACE_ROOT: ${SOURCE_WORKSPACE_ROOT:-/workspace_root}
      TASK_CONTAINER_DRIVER: ${TASK_CONTAINER_DRIVER:-docker}
      TASK_CONTAINER_IMAGE: ${TASK_CONTAINER_IMAGE:-ai-office-task-runner:latest}
      TASK_CONTAINER_IMAGE_BUILD_CONTEXT: ${TASK_CONTAINER_IMAGE_BUILD_CONTEXT:-/workspace_root}
      TASK_CONTAINER_IMAGE_DOCKERFILE: ${TASK_CONTAINER_IMAGE_DOCKERFILE:-apps/task-runner/Dockerfile}
      TASK_CONTAINER_IMAGE_AUTO_BUILD: ${TASK_CONTAINER_IMAGE_AUTO_BUILD:-true}
      TASK_CONTAINER_WORKDIR: ${TASK_CONTAINER_WORKDIR:-/task}
      TASK_CONTAINER_NETWORK: ${TASK_CONTAINER_NETWORK:-none}
      TASK_CONTAINER_NAME_PREFIX: ${TASK_CONTAINER_NAME_PREFIX:-ai-office-task}
      TASK_CONTAINER_CODEX_COMMAND: ${TASK_CONTAINER_CODEX_COMMAND:-codex}
      TASK_CONTAINER_CODEX_SANDBOX: ${TASK_CONTAINER_CODEX_SANDBOX:-workspace-write}
      TASK_CONTAINER_CODEX_HOME_HOST_PATH: ${TASK_CONTAINER_CODEX_HOME_HOST_PATH:-/Users/dmitrijfabarisov/.codex}
      TASK_CONTAINER_CODEX_HOME_CONTAINER_PATH: ${TASK_CONTAINER_CODEX_HOME_CONTAINER_PATH:-/task/.codex-source}
      TASK_CONTAINER_CODEX_HOME_RUNTIME_PATH: ${TASK_CONTAINER_CODEX_HOME_RUNTIME_PATH:-/task/.codex}
      TASK_CONTAINER_CODEX_HOME_COPY_ALLOWLIST: ${TASK_CONTAINER_CODEX_HOME_COPY_ALLOWLIST:-auth.json,config.toml,AGENTS.md,rules,skills,models_cache.json}
      TASK_CONTAINER_ENV_PASSTHROUGH: ${TASK_CONTAINER_ENV_PASSTHROUGH:-}
      DOCKER_HOST: unix:///var/run/docker.sock
      CODEX_CLI_PATH: ${CODEX_CLI_PATH:-codex}
      CODEX_WORKER_MODE: ${CODEX_WORKER_MODE:-mock}
      DIRECTOR_AUTO_RUN_ENABLED: ${DIRECTOR_AUTO_RUN_ENABLED:-true}
      DIRECTOR_AUTO_MAX_ATTEMPTS: ${DIRECTOR_AUTO_MAX_ATTEMPTS:-3}
      DIRECTOR_HEARTBEAT_ENABLED: ${DIRECTOR_HEARTBEAT_ENABLED:-true}
      DIRECTOR_HEARTBEAT_POLL_SECONDS: ${DIRECTOR_HEARTBEAT_POLL_SECONDS:-5}
      DIRECTOR_HEARTBEAT_MAX_DISPATCH_PER_TICK: ${DIRECTOR_HEARTBEAT_MAX_DISPATCH_PER_TICK:-3}
      DIRECTOR_STALE_RUN_GRACE_SECONDS: ${DIRECTOR_STALE_RUN_GRACE_SECONDS:-120}
      DIRECTOR_STALE_RUN_AUTO_RETRY_WINDOW_SECONDS: ${DIRECTOR_STALE_RUN_AUTO_RETRY_WINDOW_SECONDS:-300}
      CODEX_MODEL: ${CODEX_MODEL:-}
      CODEX_EXECUTION_TIMEOUT_SECONDS: ${CODEX_EXECUTION_TIMEOUT_SECONDS:-900}
      CRM_TALLANTO_MODE: ${CRM_TALLANTO_MODE:-mock}
      CRM_TALLANTO_BASE_URL: ${CRM_TALLANTO_BASE_URL:-}
      CRM_TALLANTO_API_TOKEN: ${CRM_TALLANTO_API_TOKEN:-}
      CRM_TALLANTO_STUDENT_PATH: ${CRM_TALLANTO_STUDENT_PATH:-/service/api/rest.php}
      CRM_AMO_MODE: ${CRM_AMO_MODE:-mock}
      CRM_AMO_BASE_URL: ${CRM_AMO_BASE_URL:-}
      CRM_AMO_API_TOKEN: ${CRM_AMO_API_TOKEN:-}
      CRM_AMO_UPSERT_PATH: ${CRM_AMO_UPSERT_PATH:-/contacts/{entity_id}}
      CRM_ANALYSIS_MODE: ${CRM_ANALYSIS_MODE:-heuristic}
    command: sh /app/docker-entrypoint.sh
    volumes:
      - ./apps/api:/app
      - .:/workspace_root
      - ${RUNTIME_ROOT:-${PWD}/runtime}:${RUNTIME_ROOT:-${PWD}/runtime}
      - ${DOCKER_HOST_SOCKET:-/Users/dmitrijfabarisov/.docker/run/docker.sock}:/var/run/docker.sock
    ports:
      - "${API_BIND_HOST:-0.0.0.0}:${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_API_KEY: ${VITE_API_KEY:-ai-office-local-key}
    command: sh -lc "npm install --no-audit --no-fund && npm run dev -w @ai-office/web -- --host 0.0.0.0 --port 5173"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${WEB_BIND_HOST:-0.0.0.0}:${WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
